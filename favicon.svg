<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bg" cx="30%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#05050f"/>
    </radialGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#5514b4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#05050f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#1e50dc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#05050f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mxglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4e7cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4e7cf6" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="7" ry="7"/>
    </clipPath>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="32" height="32" fill="url(#bg)"/>
    <rect width="32" height="32" fill="url(#glow1)" filter="url(#blur)"/>
    <rect width="32" height="32" fill="url(#glow2)" filter="url(#blur)"/>
    <rect x="2" y="2" width="28" height="28" rx="5" ry="5"
          fill="rgba(255,255,255,0.07)"
          stroke="rgba(255,255,255,0.22)" stroke-width="0.5"/>
    <line x1="6" y1="2.2" x2="26" y2="2.2"
          stroke="rgba(255,255,255,0.55)" stroke-width="0.8"
          stroke-linecap="round"/>
    <ellipse cx="16" cy="16" rx="9" ry="7" fill="url(#mxglow)" filter="url(#blur)"/>
    <text x="16" y="9.5"
          font-family="'Helvetica Neue',system-ui,sans-serif"
          font-size="4.5" font-weight="500" letter-spacing="0.5"
          text-anchor="middle" fill="rgba(255,255,255,0.60)">PLAYA</text>
    <text x="16" y="21"
          font-family="'Helvetica Neue',system-ui,sans-serif"
          font-size="14.5" font-weight="700" letter-spacing="-0.3"
          text-anchor="middle" fill="#4e7cf6">MX</text>
    <text x="16" y="27.5"
          font-family="'Helvetica Neue',system-ui,sans-serif"
          font-size="4.5" font-weight="500" letter-spacing="0.5"
          text-anchor="middle" fill="rgba(255,255,255,0.60)">CRM</text>
  </g>
  <rect x="0.25" y="0.25" width="31.5" height="31.5" rx="7" ry="7"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
</svg>
